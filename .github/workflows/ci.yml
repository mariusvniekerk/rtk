name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets

      - name: cargo test (unit)
        run: cargo test

  integration-golangci:
    name: golangci-lint integration (v1 + v2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install golangci-lint v2 (latest)
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b /usr/local/bin
          echo "GOLANGCI_V2_BIN=/usr/local/bin/golangci-lint" >> $GITHUB_ENV
          /usr/local/bin/golangci-lint version

      - name: Install golangci-lint v1 (1.62.2)
        run: |
          curl -sSfL https://github.com/golangci/golangci-lint/releases/download/v1.62.2/golangci-lint-1.62.2-linux-amd64.tar.gz | tar xz
          mv golangci-lint-1.62.2-linux-amd64/golangci-lint /usr/local/bin/golangci-lint-v1
          echo "GOLANGCI_V1_BIN=/usr/local/bin/golangci-lint-v1" >> $GITHUB_ENV
          /usr/local/bin/golangci-lint-v1 version

      - name: Run golangci-lint integration tests
        run: cargo test "test_integration" -- --ignored
